<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 11 - Working with Forms</title>
</head>
<body>

    <h1>Local Community Event Portal</h1>

    <h2>Event Registration Form</h2>

    <form id="registrationForm">

        <label>Name:</label><br>

        <input type="text" name="name">

        <div id="nameError"></div>

        <br><br>


        <label>Email:</label><br>

        <input type="email" name="email">

        <div id="emailError"></div>

        <br><br>


        <label>Select Event:</label><br>

        <select name="event">

            <option value="">Select Event</option>

            <option value="Music Festival">
                Music Festival
            </option>

            <option value="Baking Workshop">
                Baking Workshop
            </option>

            <option value="Art Exhibition">
                Art Exhibition
            </option>

        </select>

        <div id="eventError"></div>

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>


    <h2 id="result"></h2>

    <script src="main.js"></script>

</body>
</html>
