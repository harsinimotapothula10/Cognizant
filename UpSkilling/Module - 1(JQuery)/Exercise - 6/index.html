<!DOCTYPE html>
<html>
<head>
    <title>Exercise 6 - Event Helpers</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #box{
            width: 300px;
            height: 150px;
            border: 2px solid black;
            background-color: lightgray;
            margin: auto;
            padding-top: 60px;
            font-size: 20px;
        }

        input{
            margin-top: 30px;
            padding: 10px;
            width: 250px;
        }

        #message{
            margin-top: 20px;
            font-size: 18px;
            color: blue;
        }
    </style>
</head>

<body>

    <div id="box">
        Hover, Click or Double Click Me
    </div>

    <br>

    <input type="text" id="textInput" placeholder="Type something">

    <p id="message"></p>

    <script>

        $(document).ready(function(){

            $("#box").click(function(){

                $(this).css("background-color","yellow");

                $("#message").text("You clicked the box!");

            });

            $("#box").dblclick(function(){

                $(this).css("background-color","orange");

                $("#message").text("You double-clicked the box!");

            });

            $("#box").mouseenter(function(){

                $(this).css("background-color","lightgreen");

                $("#message").text("Mouse entered the box!");

            });

            $("#box").mouseleave(function(){

                $(this).css("background-color","lightgray");

                $("#message").text("Mouse left the box!");

            });

            $("#textInput").keypress(function(){

                $("#message").text("Key pressed: " + $(this).val());

            });

        });

    </script>

</body>
</html>
